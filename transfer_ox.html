<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>편입 OX 퀴즈 — 김영편입</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f4f0;font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;justify-content:center;padding:2rem 1rem}
.app{max-width:400px;width:100%;position:relative;display:flex;flex-direction:column;gap:14px}
.toast{position:fixed;left:50%;top:20px;transform:translate(-50%,-80px);background:#12122a;color:#fff;font-size:12px;font-weight:700;padding:8px 18px;border-radius:20px;white-space:nowrap;opacity:0;pointer-events:none;transition:transform .3s ease,opacity .3s ease;z-index:100}
.toast.on{transform:translate(-50%,0);opacity:1}
.brand-pill{display:inline-flex;align-items:center;gap:5px;background:#12122a;color:#fff;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;width:fit-content}
.intro-box{background:#12122a;border-radius:20px;padding:1.6rem 1.3rem 1.4rem;display:flex;flex-direction:column;gap:12px}
.intro-kicker{font-size:12px;color:#ff7b7b;font-weight:800;letter-spacing:.06em}
.intro-h{font-size:24px;font-weight:900;color:#fff;line-height:1.3}
.intro-h em{color:#ff7b7b;font-style:normal}
.intro-hook{font-size:14px;color:rgba(255,255,255,.75);line-height:1.65;border-left:3px solid #ff7b7b;padding-left:10px;margin-top:2px}
.intro-body{font-size:13px;color:rgba(255,255,255,.45);line-height:1.6}
.intro-tags{display:flex;gap:7px;flex-wrap:wrap}
.itag{background:rgba(255,255,255,.09);color:rgba(255,255,255,.6);font-size:11px;padding:4px 10px;border-radius:20px}
.btn-start{width:100%;padding:14px 0;border-radius:12px;border:none;background:#ff7b7b;color:#fff;font-size:15px;font-weight:900;cursor:pointer;margin-top:2px}
.prog-row{display:flex;align-items:center;justify-content:space-between}
.prog-label{font-size:11px;font-weight:700;color:#ff7b7b}
.prog-count{font-size:11px;color:#888}
.prog-track{height:5px;background:#e8e6e0;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:#ff7b7b;border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.ox-card{background:#fff;border:0.5px solid #ddd;border-radius:18px;padding:1.3rem 1.1rem 1.1rem;display:flex;flex-direction:column;gap:14px;animation:up .3s ease}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;width:fit-content;background:#f5f5f0;color:#666}
.ox-stem{font-size:15px;font-weight:800;color:#1a1a1a;line-height:1.55}
.ox-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ox-btn{padding:20px 0;border-radius:14px;border:1.5px solid #ddd;background:#f8f8f6;font-size:30px;cursor:pointer;transition:all .17s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.ox-btn span{font-size:12px;font-weight:700;color:#888}
.ox-btn:hover:not(:disabled){border-color:#ff7b7b;background:#fafaf5}
.ox-btn.correct{border-color:#2a9d5c;background:#e6f5ed}
.ox-btn.correct span{color:#1a6b3a}
.ox-btn.wrong{border-color:#d84040;background:#fdeaea}
.ox-btn.wrong span{color:#9a2020}
.ox-btn.dim{opacity:.35}
.ox-btn:disabled{cursor:default}
.feedback{border-radius:10px;padding:11px 13px;font-size:12.5px;line-height:1.65;font-weight:500}
.feedback.ok{background:#e6f5ed;color:#1a6b3a}
.feedback.ng{background:#fdeaea;color:#9a2020}
.btn-next-ox{width:100%;padding:12px 0;border-radius:10px;border:none;background:#12122a;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-next-ox:active{opacity:.7}
.result-shell{display:flex;flex-direction:column;gap:14px;animation:up .35s ease}
.r-hero{background:#12122a;border-radius:20px;padding:1.6rem 1.3rem 1.4rem;text-align:center;display:flex;flex-direction:column;gap:10px;align-items:center}
.r-icon{font-size:48px}
.r-score-badge{font-size:13px;font-weight:800;padding:5px 14px;border-radius:20px;background:#ff7b7b;color:#fff}
.r-title{font-size:21px;font-weight:900;color:#fff;line-height:1.35}
.r-title em{color:#ff7b7b;font-style:normal}
.r-tagline{font-size:13px;color:rgba(255,255,255,.55);line-height:1.65}
.r-box{background:#fff;border:0.5px solid #ddd;border-radius:16px;padding:1.2rem;display:flex;flex-direction:column;gap:8px}
.r-box-label{font-size:11px;font-weight:800;color:#888;letter-spacing:.06em}
.score-items{display:flex;flex-direction:column;gap:6px}
.score-row{display:flex;justify-content:space-between;align-items:flex-start;font-size:12.5px;gap:8px}
.score-q{color:#666;flex:1;line-height:1.45}
.score-mark{font-size:15px;flex-shrink:0;margin-top:1px}
.bar-wrap{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.bar-top{display:flex;justify-content:space-between;font-size:12px}
.bar-lbl{color:#888}
.bar-val{font-weight:800;color:#ff7b7b}
.bar-track{height:7px;background:#f0eeea;border-radius:99px;overflow:hidden}
.bar-fill{height:100%;background:#ff7b7b;border-radius:99px;width:0;transition:width .9s cubic-bezier(.4,0,.2,1)}
.seminar-cta{background:#12122a;border-radius:18px;padding:1.35rem 1.2rem;display:flex;flex-direction:column;gap:11px}
.sem-top-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sem-date-pill{background:#ff7b7b;color:#fff;font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px}
.sem-loc-pill{background:rgba(255,255,255,.1);color:rgba(255,255,255,.75);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
.sem-title{font-size:16px;font-weight:900;color:#fff;line-height:1.4}
.sem-title em{color:#ff7b7b;font-style:normal}
.sem-time{font-size:12px;color:rgba(255,255,255,.4);margin-top:-4px}
.sem-body{font-size:12px;color:rgba(255,255,255,.48);line-height:1.65}
.btn-sem{width:100%;padding:13px 0;border-radius:11px;border:none;background:#ff7b7b;color:#fff;font-size:14px;font-weight:900;cursor:pointer}
.btn-sem:hover{opacity:.88}
.btn-kakao{width:100%;padding:11px 0;border-radius:11px;border:none;background:rgba(255,255,255,.09);color:rgba(255,255,255,.8);font-size:13px;font-weight:600;cursor:pointer}
.share-strip{display:flex;align-items:center;justify-content:space-between;padding:0 2px}
.share-txt{font-size:12px;color:#888}
.btn-sh{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;border:0.5px solid #ddd;background:#f8f8f6;font-size:12px;font-weight:600;color:#1a1a1a;cursor:pointer}
.btn-retry{width:100%;padding:10px 0;border-radius:10px;border:1px solid #ddd;background:transparent;font-size:13px;color:#888;cursor:pointer}
.btn-retry:hover{background:#f8f8f6}
</style>
</head>
<body>
<div class="app" id="app"><div class="toast" id="toast"></div></div>
<script>
const FORM='https://forms.gle/jbSNNzMGSR4by4a67';
const KAKAO='https://pf.kakao.com/_xdxexdfl';
const Q=[
  {q:"편입 시험은 수능처럼 국어·수학·탐구를 다 봐야 한다?",ans:false,
   ok:"정답! ✗ 맞아, 편입은 영어 + 전공 두 과목만 준비하면 돼. 수능보다 범위가 훨씬 좁아.",
   ng:"아쉽게도 틀렸어. 편입은 영어+전공만 준비하면 돼. 전 과목 부담 없이 집중 공략이 가능해!"},
  {q:"현재 대학에 다니고 있으면 편입에 지원할 수 없다?",ans:false,
   ok:"정답! ✗ 맞아, 재학 중이어도 지원 가능해. 학교 다니면서 동시에 준비할 수 있어.",
   ng:"아쉽게도 틀렸어. 재학 중일 때 지원하는 경우가 오히려 더 많아. 지금 당장 준비해도 돼."},
  {q:"편입으로 SKY(서울·연세·고려대) 합격이 가능하다?",ans:true,
   ok:"정답! ○ 맞아, 매년 SKY를 포함한 상위권 대학들이 편입생을 모집해. 수능 없이 도전할 수 있어.",
   ng:"아쉽게도 틀렸어. 실제로 가능해! 수능 없이 SKY에 갈 수 있는 거의 유일한 방법이 편입이야."},
  {q:"편입 시험은 연 1회, 한 학교에만 지원할 수 있다?",ans:false,
   ok:"정답! ✗ 맞아, 학교마다 시험 일정이 달라서 여러 학교에 동시 지원이 가능해. 도전 횟수 제한도 없어!",
   ng:"아쉽게도 틀렸어. 편입은 학교마다 일정이 달라 동시에 여러 곳에 지원할 수 있고, 매년 재도전도 가능해."},
  {q:"편입은 졸업 후에만 지원할 수 있다?",ans:false,
   ok:"정답! ✗ 맞아, 일반편입은 2~3학년 재학생도 지원 가능해. 졸업 기다릴 필요 없어.",
   ng:"아쉽게도 틀렸어. 재학 중에도 지원 가능해! 오히려 재학 중에 도전하는 경우가 더 많아."},
  {q:"편입 준비 기간은 보통 최소 3년 이상 필요하다?",ans:false,
   ok:"정답! ✗ 맞아, 집중 준비하면 6개월~1년 안에 합격하는 경우도 많아. 전략이 핵심이야.",
   ng:"아쉽게도 틀렸어. 실제론 더 짧아도 돼! 6개월~1년 집중 준비로 합격한 사례가 많아."},
  {q:"전문대 졸업자도 4년제 대학 편입이 가능하다?",ans:true,
   ok:"정답! ○ 맞아, 전문대 졸업자는 학사편입 전형으로 3학년 편입에 도전할 수 있어.",
   ng:"아쉽게도 틀렸어. 전문대 출신도 학사편입으로 4년제 상위권에 갈 수 있어!"}
];
const KICKER="⚠ 모르면 손해 보는 거 알아?";
const TITLE1="편입에 대해";
const TITLE2="얼마나 잘못 알고 있어?";
const HOOK="편입 때문에 재수하는 사람들이 있어. 지금 알아두면 1년을 아낄 수 있어.";
const BTN="지금 확인하기 →";

let step=-1,results=[],advancing=false;
function E(id){return document.getElementById(id)}
function showToast(m){const e=E('toast');e.textContent=m;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),2200)}
function set(html){const a=E('app'),t=E('toast');a.innerHTML='';a.appendChild(t);const d=document.createElement('div');d.innerHTML=html;while(d.firstChild)a.appendChild(d.firstChild)}
function render(){if(step===-1){intro();return}if(step>=Q.length){showResult();return}renderQ()}

function intro(){set(`
  <div class="brand-pill">✦ 김영편입</div>
  <div class="intro-box">
    <div class="intro-kicker">${KICKER}</div>
    <div class="intro-h">${TITLE1}<br><em>${TITLE2}</em></div>
    <div class="intro-hook">${HOOK}</div>
    <div class="intro-body">7문제로 알아보는 내 편입 이해도 — 맞고 틀리면 바로 해설도 알려줄게!</div>
    <div class="intro-tags"><span class="itag">⚡ 1분 완성</span><span class="itag">O / X 선택</span><span class="itag">즉시 해설</span></div>
    <button class="btn-start" onclick="go()">${BTN}</button>
  </div>`);}

function go(){step=0;results=[];render();}

function renderQ(){
  const q=Q[step],pct=Math.round(((step+1)/Q.length)*100),res=results[step],done=res!==undefined,ok=done&&(res===q.ans);
  set(`
    <div class="brand-pill">✦ 편입 OX 퀴즈</div>
    <div class="prog-row"><div class="prog-label">편입 상식</div><div class="prog-count">${step+1} / ${Q.length}</div></div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="ox-card">
      <div class="q-badge">Q${step+1}</div>
      <div class="ox-stem">${q.q}</div>
      <div class="ox-btns">
        <button class="ox-btn ${done?(q.ans===true?'correct':(res===true?'wrong':'dim')):''}" onclick="pick(true)" ${done?'disabled':''}>⭕<span>맞다</span></button>
        <button class="ox-btn ${done?(q.ans===false?'correct':(res===false?'wrong':'dim')):''}" onclick="pick(false)" ${done?'disabled':''}>❌<span>틀리다</span></button>
      </div>
      ${done?`
        <div class="feedback ${ok?'ok':'ng'}">${ok?q.ok:q.ng}</div>
        <button class="btn-next-ox" id="btnNext" onclick="next()">${step<Q.length-1?'다음 문제 →':'결과 보기 🎉'}</button>
      `:''}
    </div>`);
}

function pick(v){
  if(results[step]!==undefined)return;
  results[step]=v;
  renderQ();
}

function next(){
  if(advancing)return;
  advancing=true;
  const btn=document.getElementById('btnNext');
  if(btn){btn.disabled=true;btn.style.opacity='0.5';}
  setTimeout(()=>{
    advancing=false;
    if(step<Q.length-1){step++;render();}else{showResult();}
  },300);
}

function showResult(){
  const correct=results.filter((r,i)=>r===Q[i].ans).length,total=Q.length,pct=Math.round((correct/total)*100);
  let icon,title,tagline,semMsg;
  if(correct<=2){
    icon='🤔';title='생각보다 모르는 게 많지?';
    tagline=`${total}문제 중 ${correct}개 정답`;
    semMsg='편입 제도, 아직 낯선 부분이 많지? 6월 20일 설명회에서 한 번에 싹 다 알아가자!';
  }else if(correct<=4){
    icon='📚';title='절반은 알고 있어!';
    tagline=`${total}문제 중 ${correct}개 정답 — 조금만 더!`;
    semMsg='어느 정도 알고 있는데 확신이 없다면? 6월 20일 설명회에서 빈틈을 채워줄게!';
  }else if(correct<=6){
    icon='👍';title='꽤 잘 알고 있어!';
    tagline=`${total}문제 중 ${correct}개 정답 — 거의 다 왔어!`;
    semMsg='잘 알고 있어! 이제 합격 전략만 남았어. 6월 20일 설명회에서 마무리하자.';
  }else{
    icon='🎯';title='편입 상식 <em>완벽해!</em>';
    tagline=`${total}문제 중 ${correct}개 정답 — 이제 전략만 남았어`;
    semMsg='이미 편입을 잘 알고 있어! 6월 20일 설명회에서 합격 전략까지 완성하고 가자.';
  }
  const items=Q.map((q,i)=>`<div class="score-row"><div class="score-q">${q.q}</div><div class="score-mark">${results[i]===q.ans?'✅':'❌'}</div></div>`).join('');
  set(`
    <div class="brand-pill">✦ 퀴즈 결과</div>
    <div class="result-shell">
      <div class="r-hero">
        <div class="r-icon">${icon}</div>
        <div class="r-score-badge">${correct} / ${total} 정답</div>
        <div class="r-title">${title}</div>
        <div class="r-tagline">${tagline}</div>
      </div>
      <div class="r-box">
        <div class="r-box-label">내 답안 정리</div>
        <div class="score-items">${items}</div>
        <div class="bar-wrap">
          <div class="bar-top"><span class="bar-lbl">편입 이해도</span><span class="bar-val">${pct}%</span></div>
          <div class="bar-track"><div class="bar-fill" id="bf"></div></div>
        </div>
      </div>
      <div class="seminar-cta">
        <div class="sem-top-row">
          <div class="sem-date-pill">6월 20일 (토)</div>
          <div class="sem-loc-pill">서울 · 대전 · 대구 · 부산</div>
        </div>
        <div class="sem-title">김영편입<br><em>27/28학년도 여름방학 단기전략 설명회</em></div>
        <div class="sem-time">14:00 — 16:00</div>
        <div class="sem-body">${semMsg}</div>
        <button class="btn-sem" onclick="window.open(FORM,'_blank')">설명회 신청하기 →</button>
        <button class="btn-kakao" onclick="window.open('https://www.kimyoung.co.kr/cust/cust_sub03.asp','_blank')">상담 신청하기</button>
      </div>
      <div class="share-strip">
        <span class="share-txt">친구한테 공유하기</span>
        <button class="btn-sh" onclick="copyLink()">🔗 링크 복사</button>
      </div>
      <button class="btn-retry" onclick="retry()">↺ 다시 풀어보기</button>
    </div>`);
  setTimeout(()=>{const b=document.getElementById('bf');if(b)b.style.width=pct+'%';},350);
}
function copyLink(){const u=FORM;navigator.clipboard?navigator.clipboard.writeText(u).then(()=>showToast('링크 복사 완료!')):fb(u)}
function fb(u){const t=document.createElement('textarea');t.value=u;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast('링크 복사 완료!')}
function retry(){step=-1;results=[];advancing=false;render();}
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재수 vs 편입 테스트 — 김영편입</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f4f0;font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;justify-content:center;padding:2rem 1rem}
.app{max-width:400px;width:100%;position:relative;display:flex;flex-direction:column;gap:14px}
.toast{position:fixed;left:50%;top:20px;transform:translate(-50%,-80px);background:#0f0f1a;color:#fff;font-size:12px;font-weight:700;padding:8px 18px;border-radius:20px;white-space:nowrap;opacity:0;pointer-events:none;transition:transform .3s ease,opacity .3s ease;z-index:100}
.toast.on{transform:translate(-50%,0);opacity:1}
.brand-pill{display:inline-flex;align-items:center;gap:5px;background:#0f0f1a;color:#fff;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;width:fit-content}

.intro-box{background:#0f0f1a;border-radius:20px;padding:1.6rem 1.3rem 1.4rem;display:flex;flex-direction:column;gap:12px}
.intro-kicker{font-size:12px;color:#f5c842;font-weight:800;letter-spacing:.06em}
.intro-h{font-size:24px;font-weight:900;color:#fff;line-height:1.3}
.intro-h em{color:#f5c842;font-style:normal}
.intro-hook{font-size:14px;color:rgba(255,255,255,.72);line-height:1.65;border-left:3px solid #f5c842;padding-left:10px;margin-top:2px}
.intro-body{font-size:13px;color:rgba(255,255,255,.45);line-height:1.6}
.intro-tags{display:flex;gap:7px;flex-wrap:wrap}
.itag{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);font-size:11px;padding:4px 10px;border-radius:20px}
.btn-start{width:100%;padding:14px 0;border-radius:12px;border:none;background:#f5c842;color:#0f0f1a;font-size:15px;font-weight:900;cursor:pointer;margin-top:2px;letter-spacing:-.01em}
.btn-start:hover{background:#e0b430}

.prog-row{display:flex;align-items:center;justify-content:space-between}
.prog-label{font-size:11px;font-weight:700;color:#f5c842}
.prog-count{font-size:11px;color:#888}
.prog-track{height:5px;background:#e8e6e0;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:#f5c842;border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}

.q-card{background:#fff;border:0.5px solid #ddd;border-radius:18px;padding:1.3rem 1.1rem 1.1rem;display:flex;flex-direction:column;gap:14px;animation:up .3s ease}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-badge{background:#fff8e0;color:#9a7a00;font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;width:fit-content}
.q-icon{font-size:28px;line-height:1}
.q-stem{font-size:16px;font-weight:800;color:#1a1a1a;line-height:1.45}
.q-sub{font-size:12px;color:#888;margin-top:-6px}
.vs-wrap{display:flex;flex-direction:column;gap:8px}
.vs-btn{border:1.5px solid #ddd;border-radius:12px;padding:13px 14px;background:#f8f8f6;cursor:pointer;transition:all .17s;text-align:left;display:flex;align-items:center;gap:11px}
.vs-btn:hover{border-color:#f5c842;background:#fff8e0}
.vs-btn.on{border-color:#f5c842;background:#fff8e0;transform:scale(1.01)}
.vs-ic{font-size:22px;flex-shrink:0}
.vs-main{font-size:14px;font-weight:700;color:#1a1a1a;line-height:1.3}
.vs-hint{font-size:11.5px;color:#888;margin-top:2px;line-height:1.4}
.nav-row{display:flex;gap:8px;margin-top:2px}
.btn-back{padding:11px 16px;border-radius:10px;border:1px solid #ddd;background:transparent;color:#888;font-size:13px;cursor:pointer}

.result-shell{display:flex;flex-direction:column;gap:14px;animation:up .35s ease}
.r-hero{background:#0f0f1a;border-radius:20px;padding:1.6rem 1.3rem 1.4rem;text-align:center;display:flex;flex-direction:column;gap:10px;align-items:center}
.r-icon{font-size:48px}
.r-type{font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px;background:#f5c842;color:#0f0f1a}
.r-title{font-size:21px;font-weight:900;color:#fff;line-height:1.35}
.r-title em{color:#f5c842;font-style:normal}
.r-tagline{font-size:13px;color:rgba(255,255,255,.55);line-height:1.65}
.r-box{background:#fff;border:0.5px solid #ddd;border-radius:16px;padding:1.2rem}
.bar-wrap{display:flex;flex-direction:column;gap:6px}
.bar-top{display:flex;justify-content:space-between;font-size:12px}
.bar-lbl{color:#888}
.bar-val{font-weight:800;color:#c8960a}
.bar-track{height:7px;background:#f0eeea;border-radius:99px;overflow:hidden}
.bar-fill{height:100%;background:#f5c842;border-radius:99px;width:0;transition:width .9s cubic-bezier(.4,0,.2,1)}

.seminar-cta{background:#0f0f1a;border-radius:18px;padding:1.35rem 1.2rem;display:flex;flex-direction:column;gap:11px}
.sem-top-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sem-date-pill{background:#f5c842;color:#0f0f1a;font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px}
.sem-loc-pill{background:rgba(255,255,255,.1);color:rgba(255,255,255,.75);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
.sem-title{font-size:16px;font-weight:900;color:#fff;line-height:1.4}
.sem-title em{color:#f5c842;font-style:normal}
.sem-time{font-size:12px;color:rgba(255,255,255,.4);margin-top:-4px}
.sem-body{font-size:12px;color:rgba(255,255,255,.48);line-height:1.65}
.btn-sem{width:100%;padding:13px 0;border-radius:11px;border:none;background:#f5c842;color:#0f0f1a;font-size:14px;font-weight:900;cursor:pointer}
.btn-sem:hover{opacity:.88}
.btn-kakao{width:100%;padding:11px 0;border-radius:11px;border:none;background:rgba(255,255,255,.09);color:rgba(255,255,255,.8);font-size:13px;font-weight:600;cursor:pointer}
.btn-kakao:hover{background:rgba(255,255,255,.16)}
.share-strip{display:flex;align-items:center;justify-content:space-between;padding:0 2px}
.share-txt{font-size:12px;color:#888}
.btn-sh{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;border:0.5px solid #ddd;background:#f8f8f6;font-size:12px;font-weight:600;color:#1a1a1a;cursor:pointer}
.btn-retry{width:100%;padding:10px 0;border-radius:10px;border:1px solid #ddd;background:transparent;font-size:13px;color:#888;cursor:pointer}
.btn-retry:hover{background:#f8f8f6}
</style>
</head>
<body>
<div class="app" id="app"><div class="toast" id="toast"></div></div>
<script>
const FORM='https://forms.gle/jbSNNzMGSR4by4a67';
const KAKAO='https://pf.kakao.com/_xdxexdfl';
const Q=[
  {icon:"📚",label:"공부 방식",stem:"나는 어떤 공부 방식이 맞아?",sub:"지금 내 스타일과 가까운 걸 골라봐",
   a:{ic:"😤",main:"전 과목 재학습",hint:"국어·수학·탐구 전부 다시 잡겠어"},
   b:{ic:"🎯",main:"영어와 전공 집중",hint:"범위 좁혀서 집중 공략하는 게 맞아"}},
  {icon:"🏫",label:"현재 상황",stem:"나는 지금 학교 다니고 있어?",sub:"지금 내 상황과 더 가까운 걸 골라봐",
   a:{ic:"📖",main:"아직 대학 전 단계",hint:"고3이거나 재수 준비 중이야"},
   b:{ic:"🎓",main:"대학 재학 중",hint:"지금 학교 다니면서 고민 중이야"}},
  {icon:"⏱️",label:"시간 감각",stem:"나한테 1년이라는 시간은?",sub:"솔직한 느낌으로 골라봐",
   a:{ic:"🔥",main:"다시 도전할 기회",hint:"1년 투자해서 수능으로 잡겠어"},
   b:{ic:"😰",main:"너무 아깝고 불안해",hint:"더 빠른 방법이 있으면 좋겠어"}},
  {icon:"🎯",label:"대학 간판",stem:"지금 대학 이름, 나한테 중요해?",sub:"미래를 생각하고 솔직하게",
   a:{ic:"🤷",main:"크게 신경 안 써",hint:"학교보다 내가 어떻게 하느냐가 중요해"},
   b:{ic:"💪",main:"그럼, 중요하지",hint:"좋은 대학 가고 싶어서 이 고민 하는 거야"}},
  {icon:"🏁",label:"내 속마음",stem:"지금 진짜 원하는 게 뭐야?",sub:"가장 솔직한 속마음을 골라봐",
   a:{ic:"✊",main:"수능으로 정정당당하게",hint:"다시 도전해서 내 실력으로 가고 싶어"},
   b:{ic:"⚡",main:"지금 상황에서 빠르게",hint:"스마트한 방법이 있으면 그게 맞아"}}
];
let step=-1,picks=Array(Q.length).fill(null),advancing=false;
function $(){return document.getElementById('app')}
function showToast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),2200)}
function set(html){const a=$(),t=document.getElementById('toast');a.innerHTML='';a.appendChild(t);const d=document.createElement('div');d.innerHTML=html;while(d.firstChild)a.appendChild(d.firstChild)}
function render(){if(step===-1){intro();return}if(step>=Q.length){result();return}renderQ()}
function intro(){set(`
  <div class="brand-pill">✦ 김영편입</div>
  <div class="intro-box">
    <div class="intro-kicker">잠깐, 그 생각 맞아?</div>
    <div class="intro-h">재수가 답이라고?<br><em>진짜?</em></div>
    <div class="intro-hook">재수 전에 이것만 확인해봐.<br>5개 질문, 1분이면 충분해.</div>
    <div class="intro-body">같은 목표, 더 빠른 방법이 있을 수 있어</div>
    <div class="intro-tags"><span class="itag">⚡ 1분 완성</span><span class="itag">A vs B 선택</span><span class="itag">유형 결과</span></div>
    <button class="btn-start" onclick="go()">확인해보기 →</button>
  </div>`);}
function go(){step=0;render();}
function renderQ(){
  const q=Q[step],pct=Math.round(((step+1)/Q.length)*100),s=picks[step];
  set(`
    <div class="brand-pill">✦ 재수 vs 편입</div>
    <div class="prog-row"><div class="prog-label">${q.label}</div><div class="prog-count">${step+1} / ${Q.length}</div></div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="q-card">
      <div class="q-badge">Q${step+1}</div>
      <div class="q-icon">${q.icon}</div>
      <div class="q-stem">${q.stem}</div>
      <div class="q-sub">${q.sub}</div>
      <div class="vs-wrap">
        <button class="vs-btn ${s===0?'on':''}" onclick="pick(0)">
          <div class="vs-ic">${q.a.ic}</div>
          <div><div class="vs-main">${q.a.main}</div><div class="vs-hint">${q.a.hint}</div></div>
        </button>
        <button class="vs-btn ${s===1?'on':''}" onclick="pick(1)">
          <div class="vs-ic">${q.b.ic}</div>
          <div><div class="vs-main">${q.b.main}</div><div class="vs-hint">${q.b.hint}</div></div>
        </button>
      </div>
      <div class="nav-row">
        ${step>0?`<button class="btn-back" onclick="back()">← 이전</button>`:''}
      </div>
    </div>`);
}
function pick(v){
  if(advancing)return;
  picks[step]=v;
  // 선택 하이라이트 먼저 보여주기
  const btns=document.querySelectorAll('.vs-btn');
  btns.forEach((b,i)=>{b.classList.toggle('on',i===v);});
  advancing=true;
  setTimeout(()=>{
    advancing=false;
    if(step<Q.length-1){step++;render();}else{result();}
  },400);
}
function back(){if(advancing)return;if(step>0){step--;render();}}
function result(){
  const score=picks.reduce((s,p)=>s+(p===1?1:0),0);
  const pct=Math.round((score/Q.length)*100);
  const isT=score>=3;
  const semMsg=isT
    ?`봐봐, 재수가 아니잖아.<br>6월 20일 설명회에서 편입 전략 제대로 잡아봐.`
    :`재수 의지는 좋아. 근데 한 번만 더 들어봐.<br>6월 20일 설명회, 듣고 나서 결정해도 안 늦어.`;
  set(`
    <div class="brand-pill">✦ 테스트 결과</div>
    <div class="result-shell">
      <div class="r-hero">
        <div class="r-icon">${isT?'🚀':'📖'}</div>
        <div class="r-type">${isT?'편입형':'재수형'}</div>
        <div class="r-title">${isT?'봐봐, 너는<br><em>편입이 맞잖아</em>':'재수 의지,<br>아직 있구나!'}</div>
        <div class="r-tagline">${isT?'재수 아니어도 돼.\n더 좋은 방법이 있어.':'그 의지, 좋아.\n근데 이 방법도 있다는 거 알고 가.'}</div>
      </div>
      <div class="r-box">
        <div class="bar-wrap">
          <div class="bar-top"><span class="bar-lbl">편입 적합도</span><span class="bar-val">${pct}%</span></div>
          <div class="bar-track"><div class="bar-fill" id="bf"></div></div>
        </div>
      </div>
      <div class="seminar-cta">
        <div class="sem-top-row">
          <div class="sem-date-pill">6월 20일 (토)</div>
          <div class="sem-loc-pill">서울 · 대전 · 대구 · 부산</div>
        </div>
        <div class="sem-title">김영편입<br><em>27/28학년도 여름방학 단기전략 설명회</em></div>
        <div class="sem-time">14:00 — 16:00</div>
        <div class="sem-body">${semMsg}</div>
        <button class="btn-sem" onclick="window.open('${FORM}','_blank')">설명회 신청하기 →</button>
        <button class="btn-kakao" onclick="window.open('https://www.kimyoung.co.kr/cust/cust_sub03.asp','_blank')">상담 신청하기</button>
      </div>
      <div class="share-strip">
        <span class="share-txt">친구한테 공유하기</span>
        <button class="btn-sh" onclick="copyLink()">🔗 링크 복사</button>
      </div>
      <button class="btn-retry" onclick="retry()">↺ 다시 테스트하기</button>
    </div>`);
  setTimeout(()=>{const b=document.getElementById('bf');if(b)b.style.width=pct+'%';},350);
}
function copyLink(){const u='https://borainbow.github.io/minitest/transfer_choice.html';navigator.clipboard?navigator.clipboard.writeText(u).then(()=>showToast('링크 복사 완료!')):fb(u)}
function fb(u){const t=document.createElement('textarea');t.value=u;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast('링크 복사 완료!')}
function retry(){step=-1;picks=Array(Q.length).fill(null);advancing=false;render();}
render();
</script>
</body>
</html>
